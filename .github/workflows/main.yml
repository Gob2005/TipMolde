name: TipMolde CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Check local .NET SDK
        shell: powershell
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: |
            **/bin/Release/**
          if-no-files-found: error

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Check local .NET SDK
        shell: powershell
        run: |
          dotnet --info
          dotnet --list-sdks

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests with coverage
        run: dotnet test --configuration Release
             --collect:"XPlat Code Coverage"
             --results-directory:"TestResults"
             --
             DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload test results
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: "**/TestResults/**"
          if-no-files-found: warn
        if: always()

  coverage-report:
    runs-on: self-hosted
    needs: [ build, test ]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v7
        with:
          name: test-results
          path: TestResults

      - name: Install ReportGenerator
        run: dotnet tool update -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: reportgenerator
             -reports:"TestResults/**/coverage.cobertura.xml"
             -targetdir:"coveragereport"
             -reporttypes:"Html;TextSummary"
        continue-on-error: true

      - name: Print coverage summary
        shell: powershell
        run: |
          $summary = "coveragereport/Summary.txt"
          if (Test-Path $summary) {
            Get-Content $summary
          } else {
            Write-Host "Resumo de cobertura nao encontrado."
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: coveragereport
          if-no-files-found: warn
        if: always()

  docker-build:
    runs-on: self-hosted
    needs: [ build, test, coverage-report ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        shell: powershell
        run: |
          $dockerfile = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter Dockerfile |
                        Select-Object -First 1 -ExpandProperty FullName
          if (-not $dockerfile) { throw "Dockerfile nao encontrado em $env:GITHUB_WORKSPACE" }

          $context = Split-Path -Path $dockerfile -Parent
          Write-Host "Dockerfile: $dockerfile"
          Write-Host "Contexto: $context"

          docker build -t tipmolde-api:latest -f "$dockerfile" "$context"
