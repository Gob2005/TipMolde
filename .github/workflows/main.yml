name: TipMolde CI/CD Pipeline

on:
  push:
    branches: [ "master" , "main"  ]

jobs:
  build-job:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Compilar .NET
        run: dotnet build --configuration Release

  test-code:
    runs-on: self-hosted
    needs: build-job
    steps:
      - uses: actions/checkout@v4
      - name: Executar Testes
        run: dotnet test

  deploy-docker:
    runs-on: self-hosted
    needs: test-code
    steps:
      - uses: actions/checkout@v4
      - name: Criar Imagem Docker
        run: docker build -t tipmolde-api:latest .
