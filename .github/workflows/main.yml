name: Docker TipMolde

on:
  push:
    branches: [ "main" ] 

jobs:
  build-and-push:
    runs-on: self-hosted 

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar e Compilar
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Build Docker Image
        run: |
          docker build -t tipmolde-api:latest .

      - name: Tag Image
        run: docker tag tipmolde-api:latest minha-empresa.azurecr.io/tipmolde-api:v1
